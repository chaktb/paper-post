<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} · PDL Projects</title>
  <link rel="stylesheet" href="/style.css" />
  <script>(function(){try{var t=localStorage.getItem("pdl-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <p>{{SUBTITLE}}</p>
    <nav>
      <a href="/">← Projects</a>
      <a href="{{SOURCE_URL}}">원문 ↗</a>
      <a href="https://github.com/chaktb/pages">GitHub</a>
      <button class="theme-toggle" type="button"><span class="icon">☀️</span><span class="label">라이트</span></button>
    </nav>
  </header>

  <main>
    <p style="color:var(--muted);font-size:.85rem;margin:0 0 1.5rem;">발행일 {{DATE}}</p>

{{BODY}}

  </main>

  <footer>
    Powered by Cloudflare Workers · <a href="https://github.com/chaktb/pages">소스 보기</a>
  </footer>
  <script src="/main.js"></script>
</body>
</html>
